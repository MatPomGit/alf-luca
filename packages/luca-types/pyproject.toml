[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "luca-types"
version = "0.1.0"
description = "Pakiet wydzielony z luca_tracker"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.6",
]

[tool.setuptools.packages.find]
where = ["src"]
