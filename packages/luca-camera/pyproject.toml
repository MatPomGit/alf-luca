[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "luca-camera"
version = "0.1.0"
description = "Pakiet wydzielony z luca_tracker"
requires-python = ">=3.10"
dependencies = [
    "opencv-python>=4.8",
    "numpy>=1.24",
    "luca-input",
    "luca-tracking",
]

[tool.setuptools.packages.find]
where = ["src"]
