name: Internal API Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  block-internal-imports:
    name: Block non-public imports across packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install checker dependencies
        run: python -m pip install --upgrade pip tomli

      - name: Validate imports through package public API
        run: python tools/check_architecture_policy.py

      - name: Block `_internal` imports outside owner package
        run: python tools/check_architecture_policy.py
