name: Packages CI/CD

on:
  push:
    branches: [main, master]
    tags:
      - '*/*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint-test:
    name: Lint + test (${{ matrix.package.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: luca-types
            path: packages/luca-types
            module: luca_types
          - name: luca-input
            path: packages/luca-input
            module: luca_input
          - name: luca-camera
            path: packages/luca-camera
            module: luca_camera
          - name: luca-processing
            path: packages/luca-processing
            module: luca_processing
          - name: luca-tracking
            path: packages/luca-tracking
            module: luca_tracking
          - name: luca-reporting
            path: packages/luca-reporting
            module: luca_reporting
          - name: luca-publishing
            path: packages/luca-publishing
            module: luca_publishing
          - name: luca-interface-cli
            path: packages/luca-interface-cli
            module: luca_interface_cli
          - name: luca-interface-gui
            path: packages/luca-interface-gui
            module: luca_interface_gui
          - name: luca-interface-ros2
            path: packages/luca-interface-ros2
            module: luca_interface_ros2
          - name: luca-suite
            path: packages/luca-suite
            module: luca_suite

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CI tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff pytest build

      - name: Install package in editable mode
        run: python -m pip install -e ./${{ matrix.package.path }}

      - name: Lint package sources
        run: |
          if [ -d "${{ matrix.package.path }}/src" ]; then
            ruff check "${{ matrix.package.path }}/src"
          else
            echo "Brak katalogu src dla metapakietu - pomijam lint kodu."
          fi

      - name: Smoke test package import
        run: python -c "import ${{ matrix.package.module }}; print('import ok:', '${{ matrix.package.module }}')"

  build-artifacts:
    name: Build wheel + sdist (${{ matrix.package.name }})
    runs-on: ubuntu-latest
    needs: lint-test
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: luca-types
            path: packages/luca-types
          - name: luca-input
            path: packages/luca-input
          - name: luca-camera
            path: packages/luca-camera
          - name: luca-processing
            path: packages/luca-processing
          - name: luca-tracking
            path: packages/luca-tracking
          - name: luca-reporting
            path: packages/luca-reporting
          - name: luca-publishing
            path: packages/luca-publishing
          - name: luca-interface-cli
            path: packages/luca-interface-cli
          - name: luca-interface-gui
            path: packages/luca-interface-gui
          - name: luca-interface-ros2
            path: packages/luca-interface-ros2
          - name: luca-suite
            path: packages/luca-suite

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build package
        run: python -m build ./${{ matrix.package.path }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.package.name }}
          path: ${{ matrix.package.path }}/dist/*

  publish-github-packages:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: lint-test
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: luca-types
            path: packages/luca-types
          - name: luca-input
            path: packages/luca-input
          - name: luca-camera
            path: packages/luca-camera
          - name: luca-processing
            path: packages/luca-processing
          - name: luca-tracking
            path: packages/luca-tracking
          - name: luca-reporting
            path: packages/luca-reporting
          - name: luca-publishing
            path: packages/luca-publishing
          - name: luca-interface-cli
            path: packages/luca-interface-cli
          - name: luca-interface-gui
            path: packages/luca-interface-gui
          - name: luca-interface-ros2
            path: packages/luca-interface-ros2
          - name: luca-suite
            path: packages/luca-suite

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install publishing tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Verify tag matches package
        id: tag_check
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          EXPECTED_PREFIX="${{ matrix.package.name }}/v"
          if [[ "$TAG" == "$EXPECTED_PREFIX"* ]]; then
            echo "match=true" >> "$GITHUB_OUTPUT"
          else
            echo "match=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build tagged package
        if: steps.tag_check.outputs.match == 'true'
        run: python -m build ./${{ matrix.package.path }}

      - name: Publish package to GitHub Packages
        if: steps.tag_check.outputs.match == 'true'
        env:
          TWINE_USERNAME: ${{ github.actor }}
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m twine upload \
            --repository-url "https://upload.pypi.pkg.github.com/${{ github.repository_owner }}/" \
            ${{ matrix.package.path }}/dist/*
